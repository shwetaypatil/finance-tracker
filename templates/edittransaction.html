const urlParams = new URLSearchParams(window.location.search);
const transactionId = urlParams.get("id");

// Load transaction details
fetch(`/transactions/${transactionId}`, {
    credentials: "include"
})
.then(res => res.json())
.then(data => {
    document.getElementById("titleInput").value = data.title || "";
    document.getElementById("amountInput").value = data.amount;
    document.getElementById("categorySelect").value = data.category;
    document.getElementById("dateInput").value = data.date.split("T")[0];
    document.getElementById("descriptionInput").value = data.note || "";

    document.querySelector(
        `input[name="transaction_type"][value="${data.type}"]`
    ).checked = true;
});

// UPDATE
document.getElementById("updateBtn").addEventListener("click", function(e) {
    e.preventDefault();

    const updatedData = {
        title: document.getElementById("titleInput").value,
        amount: document.getElementById("amountInput").value,
        category: document.getElementById("categorySelect").value,
        date: document.getElementById("dateInput").value,
        note: document.getElementById("descriptionInput").value,
        type: document.querySelector(
            'input[name="transaction_type"]:checked'
        ).value
    };

    fetch(`/transactions/update/${transactionId}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        credentials: "include",
        body: JSON.stringify(updatedData)
    })
    .then(res => res.json())
    .then(() => {
        alert("Transaction updated successfully!");
        window.location.href = "/transactions";
    });
});

// DELETE
document.getElementById("deleteBtn").addEventListener("click", function () {
    if (!confirm("Are you sure?")) return;

    fetch(`/api/transactions/${transactionId}`, {
        method: "DELETE",
        credentials: "include"
    })
    .then(res => res.json())
    .then(() => {
        alert("Transaction deleted!");
        window.location.href = "/transactions";
    });
});
