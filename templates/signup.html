<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4A90E2", // From user prompt, modifying theme
              "background-light": "#F7F8FC", // From user prompt
              "background-dark": "#101922",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem", // Modifying to be slightly larger for a softer look
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#333333] dark:text-slate-200">
<div class="flex min-h-screen flex-col items-center justify-center p-4">
<div class="w-full max-w-md">
<!-- Logo and App Name -->
<div class="mb-6 flex items-center justify-center gap-3">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-2xl font-bold leading-tight tracking-[-0.015em] text-slate-800 dark:text-white">Finance Tracker</h2>
</div>
<!-- Form Container -->
<div class="rounded-xl border border-slate-200/80 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900/50 sm:p-8">
<h1 class="mb-1 text-center text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Create Your Account</h1>
<p class="mb-6 text-center text-sm text-slate-500 dark:text-slate-400">Get started with our platform today.</p>
<form class="space-y-5">
<!-- Username -->
<div>
<label class="mb-1.5 block text-sm font-medium text-slate-700 dark:text-slate-300" for="username">Username</label>
<input class="form-input w-full rounded-lg border-slate-300 bg-slate-50 p-3 text-sm placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:placeholder:text-slate-500" id="username" placeholder="e.g., jane_doe" type="text"/>
</div>
<!-- First Name -->
<div>
<label class="mb-1.5 block text-sm font-medium text-slate-700 dark:text-slate-300" for="first-name">First Name</label>
<input class="form-input w-full rounded-lg border-slate-300 bg-slate-50 p-3 text-sm placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:placeholder:text-slate-500" id="first-name" placeholder="e.g., Jane" type="text"/>
</div>
<!-- Last Name -->
<div>
<label class="mb-1.5 block text-sm font-medium text-slate-700 dark:text-slate-300" for="last-name">Last Name</label>
<input class="form-input w-full rounded-lg border-slate-300 bg-slate-50 p-3 text-sm placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:placeholder:text-slate-500" id="last-name" placeholder="e.g., Doe" type="text"/>
</div>
<!-- Email -->
<div>
<label class="mb-1.5 block text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
<input class="form-input w-full rounded-lg border-slate-300 bg-slate-50 p-3 text-sm placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:placeholder:text-slate-500" id="email" placeholder="you@example.com" type="email"/>
</div>
<!-- Password -->
<div>
<label class="mb-1.5 block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<div class="relative flex items-center">
<input class="form-input w-full rounded-lg border-slate-300 bg-slate-50 p-3 pr-10 text-sm placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:placeholder:text-slate-500" id="password" placeholder="Enter your password" type="password"/>
<button id="togglePassword" class="absolute right-0 mr-3 flex h-full items-center text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300" type="button" aria-label="Toggle password visibility">
<span class="material-symbols-outlined text-base" data-icon>visibility</span>
</button>
</div>
<p class="mt-1.5 text-xs text-slate-500 dark:text-slate-400">Must be at least 8 characters long.</p>
</div>
<!-- Confirm Password -->
<div>
<label class="mb-1.5 block text-sm font-medium text-slate-700 dark:text-slate-300" for="confirm-password">Confirm Password</label>
<div class="relative flex items-center">
<input class="form-input w-full rounded-lg border-slate-300 bg-slate-50 p-3 pr-10 text-sm placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:placeholder:text-red-500/80" id="confirm-password" placeholder="Re-enter your password" type="password"/>
<button id="toggleConfirm" class="absolute right-0 mr-3 flex h-full items-center text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300" type="button" aria-label="Toggle confirm password visibility">
<span class="material-symbols-outlined text-base" data-icon>visibility_off</span>
</button>
</div>
<p class="mt-1.5 text-xs text-slate-500 dark:text-slate-400">Passwords do not match.</p>
</div>
<!-- Create Account Button -->
<div>
<button id="signBtn" class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg bg-primary px-4 py-3 text-sm font-bold text-white transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900">
<span class="truncate">Create Account</span>
</button>
</div>
</form>
<!-- Log In Link -->
<p class="mt-6 text-center text-sm text-slate-600 dark:text-slate-400">
                    Already have an account?
                    <a class="font-semibold text-primary hover:underline" href="/">Log in</a>
</p>
</div>
<!-- Footer Links -->
<div class="mt-6 text-center text-xs text-slate-500 dark:text-slate-500">
<a class="hover:underline" href="#">Terms of Service</a>
<span class="mx-2">·</span>
<a class="hover:underline" href="#">Privacy Policy</a>
</div>
</div>
</div>

<script>
const signupPasswordInput = document.getElementById("password");
const signupConfirmInput = document.getElementById("confirm-password");
const signupToggleBtn = document.getElementById("togglePassword");
const signupConfirmBtn = document.getElementById("toggleConfirm");
const signupToggleIcon = signupToggleBtn?.querySelector("[data-icon]");
const signupConfirmIcon = signupConfirmBtn?.querySelector("[data-icon]");

if (signupPasswordInput && signupToggleBtn && signupToggleIcon) {
    signupToggleBtn.addEventListener("click", () => {
        const isHidden = signupPasswordInput.type === "password";
        signupPasswordInput.type = isHidden ? "text" : "password";
        signupToggleIcon.textContent = isHidden ? "visibility_off" : "visibility";
    });
}

if (signupConfirmInput && signupConfirmBtn && signupConfirmIcon) {
    signupConfirmBtn.addEventListener("click", () => {
        const isHidden = signupConfirmInput.type === "password";
        signupConfirmInput.type = isHidden ? "text" : "password";
        signupConfirmIcon.textContent = isHidden ? "visibility_off" : "visibility";
    });
}

document.getElementById("signBtn").addEventListener("click", async function (e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const firstName = document.getElementById("first-name").value.trim();
    const lastName = document.getElementById("last-name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirm-password").value.trim();

    resetStyles();

    let isValid = true;
    const emailPattern = /^[^@]+@[^@]+\.[a-zA-Z]{2,}$/;

    if (username === "") {
        showError("username", "Username cannot be empty");
        isValid = false;
    }

    if (firstName.length < 2) {
        showError("first-name", "Enter a valid first name");
        isValid = false;
    }

    if (lastName.length < 2) {
        showError("last-name", "Enter a valid last name");
        isValid = false;
    }

    if (!emailPattern.test(email)) {
        showError("email", "Enter a valid email");
        isValid = false;
    }

    if (password.length < 8) {
        showError("password", "Password must be at least 8 characters");
        isValid = false;
    }

    if (password !== confirmPassword) {
        showError("confirm-password", "Passwords do not match");
        isValid = false;
    }

    if (!isValid) return;

    // 🔹 CALL BACKEND
    try {
        const response = await fetch("/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                first_name: firstName,
                last_name: lastName,
                email,
                password,
                confirm: confirmPassword
            })
        });

        const data = await response.json();

        if (data.success) {
            alert("Signup successful!");
            window.location.href = "/";   // login page
        } else {
            alert(data.msg);
        }
    } catch (error) {
        console.error(error);
        alert("Server error. Try again later.");
    }
});

function showError(id, message) {
    const input = document.getElementById(id);
    input.classList.add("border-red-500", "bg-red-50");

    const error = document.createElement("p");
    error.className = "mt-1 text-xs text-red-600";
    error.innerText = message;

    input.parentNode.insertAdjacentElement("afterend", error);
}

function resetStyles() {
    document.querySelectorAll("input").forEach(input => {
        input.classList.remove("border-red-500", "bg-red-50");
        const err = input.parentNode.nextElementSibling;
        if (err && err.tagName === "P") err.remove();
    });
}
</script>


</body>
</html>
